<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassepp | Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="intro">
        <div class="puzzle-container">
            <span class="letter">H</span>
            <span class="letter">A</span>
            <span class="letter">S</span>
            <span class="letter">S</span>
            <span class="letter">E</span>
            <span class="letter">P</span>
            <span class="letter">P</span>
        </div>
        <div class="glow-bg"></div>
    </div>

    <div class="container" id="main">
        <div class="bento-grid">
            <div class="card profile">
                <div class="pfp">
                    <img src="https://ui-avatars.com/api/?name=Hassepp&background=00f2ff&color=000&bold=true" alt="Hassepp">
                </div>
                <h1>Hassepp</h1>
                <p>Digital Creator • 2026</p>
            </div>

            <a href="https://www.instagram.com/hassepp_" class="card link-item">
                <i data-lucide="instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="#" class="card link-item">
                <i data-lucide="github"></i>
                <span>GitHub</span>
            </a>

            <div class="card wide info">
                <h3>Current Status</h3>
                <p>Building seamless digital experiences with a touch of future aesthetic.</p>
            </div>

            <a href="#" class="card wide cta">
                <span>Let's Connect</span>
                <i data-lucide="external-link"></i>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        window.addEventListener('load', () => {
            // Hilangkan intro setelah animasi selesai
            setTimeout(() => {
                const intro = document.getElementById('intro');
                const main = document.getElementById('main');
                
                intro.style.transition = "opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.8s";
                intro.style.opacity = "0";
                intro.style.filter = "blur(20px)";
                
                setTimeout(() => {
                    intro.style.display = "none";
                    main.classList.add('show');
                }, 800);
            }, 2500);
        });
    </script>
</body>
</html>
